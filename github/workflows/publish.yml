name: Build & Publish MyPlans Extension

on:
  # Auto-publish when you push a version tag: git tag v1.2.3 && git push --tags
  push:
    tags:
      - 'v*.*.*'

  # Also allow a manual trigger from the Actions tab (no tag required)
  workflow_dispatch:
    inputs:
      publish_target:
        description: 'Where to publish'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - marketplace
          - openvsx

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. BUILD - install deps, bump version from tag, package .vsix
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build .vsix
    runs-on: ubuntu-latest

    outputs:
      vsix_path: ${{ steps.package.outputs.vsix_path }}
      version:   ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Derive version from the git tag (v1.2.3 → 1.2.3)
      # Falls back to the version already in package.json for manual runs
      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      # Stamp the resolved version into package.json before packaging
      - name: Update package.json version
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = '${{ steps.version.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Package extension (.vsix)
        id: package
        run: |
          npx @vscode/vsce package --no-dependencies
          VSIX=$(ls *.vsix | head -1)
          echo "vsix_path=${VSIX}" >> "$GITHUB_OUTPUT"
          echo "Packaged: ${VSIX}"

      # Upload artifact so other jobs (and humans) can download it
      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: myplans-vsix
          path: ${{ steps.package.outputs.vsix_path }}
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. PUBLISH TO VS CODE MARKETPLACE
  #    Requires secret: VSCE_PAT  (Personal Access Token from Azure DevOps)
  # ─────────────────────────────────────────────────────────────────────────────
  publish-marketplace:
    name: Publish → VS Code Marketplace
    needs: build
    runs-on: ubuntu-latest

    # Run when: tag push OR manual with target=marketplace|both
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.publish_target == 'marketplace' ||
        github.event.inputs.publish_target == 'both'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download .vsix artifact
        uses: actions/download-artifact@v4
        with:
          name: myplans-vsix

      - name: Publish to Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          VSIX=$(ls *.vsix | head -1)
          echo "Publishing ${VSIX} to VS Code Marketplace…"
          npx @vscode/vsce publish --packagePath "${VSIX}" --pat "${VSCE_PAT}"

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. PUBLISH TO OPEN VSX REGISTRY  (open-source / VSCodium alternative)
  #    Requires secret: OVSX_PAT  (token from open-vsx.org)
  # ─────────────────────────────────────────────────────────────────────────────
  publish-openvsx:
    name: Publish → Open VSX Registry
    needs: build
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.publish_target == 'openvsx' ||
        github.event.inputs.publish_target == 'both'))

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download .vsix artifact
        uses: actions/download-artifact@v4
        with:
          name: myplans-vsix

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          VSIX=$(ls *.vsix | head -1)
          echo "Publishing ${VSIX} to Open VSX Registry…"
          npx ovsx publish "${VSIX}" --pat "${OVSX_PAT}"

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. GITHUB RELEASE - attach the .vsix to the tag release page
  # ─────────────────────────────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    needs: [build, publish-marketplace, publish-openvsx]
    runs-on: ubuntu-latest

    # Only runs on tag pushes; skip for manual workflow runs
    if: github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - name: Download .vsix artifact
        uses: actions/download-artifact@v4
        with:
          name: myplans-vsix

      - name: Create release and upload .vsix
        uses: softprops/action-gh-release@v2
        with:
          name: "MyPlans v${{ needs.build.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          body: |
            ## MyPlans v${{ needs.build.outputs.version }}

            ### Install
            **VS Code Marketplace** - search *MyPlans* in the Extensions panel, or:
            ```
            ext install myplans.myplans
            ```
            **Manual** - download `myplans-${{ needs.build.outputs.version }}.vsix` below and run:
            ```
            code --install-extension myplans-${{ needs.build.outputs.version }}.vsix
            ```

            ### What's changed
            _See commit history for details._
          files: "*.vsix"
          draft: false
          prerelease: ${{ contains(needs.build.outputs.version, '-') }}
