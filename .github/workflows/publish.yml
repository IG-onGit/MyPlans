name: Publish MyPlans to VS Code Marketplace

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Stamp version from tag into package.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Package & Publish
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
        run: npx @vscode/vsce publish --no-dependencies --pat "$VSCE_TOKEN"
